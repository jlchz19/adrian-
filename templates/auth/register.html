{% extends "base.html" %}

{% block content %}
<style>
    body {
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
    }
    .container {
        margin: 0 auto !important;
        display: flex; align-items: center; justify-content: center;
        min-height: calc(100vh - 100px); padding: 2rem 1rem;
    }
    .auth-wrapper {
        margin: 0 auto !important; width: 100%; height: auto;
    }
    .professional-auth {
        padding: 2rem !important; display: flex; flex-direction: column; justify-content: center;
    }
    .form-group { margin-bottom: 1rem !important; }
    .auth-logo { width: 48px !important; height: 48px !important; margin-bottom: 0.5rem !important; }
    .auth-logo svg { width: 24px; height: 24px; }
    .professional-input { height: 48px !important; }
    .professional-btn { height: 48px !important; margin-top: 0.5rem !important; }
    .auth-header h2 { font-size: 1.5rem !important; margin-bottom: 0.2rem !important; }
    @media (max-width: 768px) {
        .professional-auth { padding: 1.5rem !important; }
        .auth-header h2 { font-size: 1.25rem !important; }
        .container { padding: 1rem 0.5rem; min-height: calc(100vh - 80px); }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-image-side">
        <img src="{{ url_for('static', filename='img/imagen.webp') }}" alt="FinanzasPro Registro" class="auth-cover-image">
    </div>
    <div class="auth-container glass-panel professional-auth">
        <div class="auth-header text-center mb-4">
            <div class="auth-logo mb-3">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
            </div>
            <h2>Crear Cuenta</h2>
            <p class="text-muted">Únete a FinanzasPro y empieza a gestionar tus bolsillos</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group floating-group">
                <input type="text" id="username" name="username" class="form-control professional-input" placeholder=" " required>
                <label for="username" class="floating-label">Usuario</label>
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
            <div class="form-group floating-group">
                <input type="email" id="email" name="email" class="form-control professional-input" placeholder=" " required>
                <label for="email" class="floating-label">Correo Electrónico</label>
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
            </div>
            <div class="form-group floating-group">
                <input type="password" id="password" name="password" class="form-control professional-input" placeholder=" " required>
                <label for="password" class="floating-label">Contraseña</label>
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
            </div>
            
            <div class="form-actions mb-4 mt-2">
                <button type="submit" class="btn btn-primary btn-block professional-btn">
                    <span>Registrarse</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                </button>
            </div>
        </form>
        
        <div class="auth-footer text-center">
            <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="auth-link auth-link-bold">Inicia Sesión aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
