{% extends "base.html" %}

{% block content %}
<style>
    body { overflow-y: hidden; }
    .container {
        margin: 0 auto !important;
        display: flex; align-items: center; justify-content: center;
        height: calc(100vh - 80px);
    }
    .auth-wrapper {
        margin: 0 !important; width: 100%; max-height: 95vh;
    }
    .professional-auth {
        padding: 2rem !important; display: flex; flex-direction: column; justify-content: center;
    }
    .form-group { margin-bottom: 1rem !important; }
    .auth-logo { width: 48px !important; height: 48px !important; margin-bottom: 0.5rem !important; }
    .auth-logo svg { width: 24px; height: 24px; }
    .professional-input { height: 48px !important; }
    .professional-btn { height: 48px !important; margin-top: 0.5rem !important; }
    .auth-header h2 { font-size: 1.5rem !important; margin-bottom: 0.2rem !important; }
    @media (max-width: 768px) { .professional-auth { padding: 1.5rem !important; } }
</style>

<div class="auth-wrapper">
    <div class="auth-image-side">
        <img src="{{ url_for('static', filename='img/imagen.webp') }}" alt="FinanzasPro Recuperación" class="auth-cover-image">
    </div>
    <div class="auth-container glass-panel professional-auth">
        <div class="auth-header text-center mb-4">
            <div class="auth-logo mb-3">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2>Recuperar Contraseña</h2>
            <p class="text-muted" style="font-size: 0.9rem;">Ingresa tu correo para restablecer tu contraseña</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group floating-group">
                <input type="email" id="email" name="email" class="form-control professional-input" placeholder=" " required>
                <label for="email" class="floating-label">Correo Electrónico</label>
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
            </div>
            
            <div class="form-actions mb-4 mt-2">
                <button type="submit" class="btn btn-primary btn-block professional-btn">
                    <span>Enviar Instrucciones</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </form>
        
        <div class="auth-footer text-center">
            <p><a href="{{ url_for('login') }}" class="auth-link auth-link-bold">Volver al inicio de sesión</a></p>
        </div>
    </div>
</div>
{% endblock %}
