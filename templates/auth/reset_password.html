{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel">
    <h2 class="text-center mb-4">Recuperar Contraseña</h2>
    <p class="text-center mb-4" style="color: #94a3b8; font-size: 0.9rem;">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
    <form method="POST">
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar Instrucciones</button>
    </form>
    <div class="text-center mt-4">
        <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Volver al inicio de sesión</a>
    </div>
</div>
{% endblock %}
