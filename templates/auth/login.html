{% extends "base.html" %}

{% block content %}
<style>
    body {
        overflow-y: auto;
    }
    .container {
        margin: 0 auto !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 100px); /* Use min-height so it can expand */
        padding: 2rem 1rem;
        width: 100%;
        max-width: 100%;
    }
    .auth-wrapper {
        margin: 0 auto !important;
        width: 100%;
        height: auto;
    }
    .professional-auth {
        padding: 2rem !important;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .form-group {
        margin-bottom: 1rem !important;
    }
    .auth-logo {
        width: 48px !important;
        height: 48px !important;
        margin-bottom: 0.5rem !important;
    }
    .auth-logo svg {
        width: 24px;
        height: 24px;
    }
    .professional-input {
        height: 48px !important;
    }
    .professional-btn {
        height: 48px !important;
        margin-top: 0.5rem !important;
    }
    .auth-header h2 {
        font-size: 1.5rem !important;
        margin-bottom: 0.2rem !important;
    }
    @media (max-width: 768px) {
        .professional-auth { padding: 1.5rem !important; }
        .auth-header h2 { font-size: 1.25rem !important; }
        .container { padding: 1rem 0.5rem; min-height: calc(100vh - 80px); }
    }
</style>
<div class="auth-wrapper">
    <div class="auth-image-side">
        <img src="{{ url_for('static', filename='img/imagen.webp') }}" alt="FinanzasPro Login" class="auth-cover-image">
    </div>
    <div class="auth-container glass-panel professional-auth">
    <div class="auth-header text-center mb-4">
        <div class="auth-logo mb-3">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        </div>
        <h2>Bienvenido de nuevo</h2>
        <p class="text-muted">Ingresa tus credenciales para acceder a tu cuenta</p>
    </div>
    
    <form method="POST" class="auth-form">
        <div class="form-group floating-group">
            <input type="text" id="username" name="username" class="form-control professional-input" placeholder=" " required>
            <label for="username" class="floating-label">Usuario</label>
            <div class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </div>
        <div class="form-group floating-group">
            <input type="password" id="password" name="password" class="form-control professional-input" placeholder=" " required>
            <label for="password" class="floating-label">Contraseña</label>
            <div class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
        </div>
        
        <div class="form-actions mb-4 mt-4">
            <button type="submit" class="btn btn-primary btn-block professional-btn">
                <span>Entrar</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </form>
    
    <div class="auth-footer text-center">
        <p class="mb-2"><a href="{{ url_for('reset_password') }}" class="auth-link">¿Olvidaste tu contraseña?</a></p>
        <p>¿No tienes cuenta? <a href="{{ url_for('register') }}" class="auth-link auth-link-bold">Regístrate aquí</a></p>
    </div>
    </div>
</div>
{% endblock %}
